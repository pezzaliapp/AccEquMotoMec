<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d222b"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c8102e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8102e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Outer tire ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#c8102e" stroke-width="22"/>
  <!-- Tread notches -->
  <g stroke="#c8102e" stroke-width="10" stroke-linecap="round">
    <line x1="256" y1="62"  x2="256" y2="90" />
    <line x1="256" y1="422" x2="256" y2="450" />
    <line x1="62"  y1="256" x2="90"  y2="256" />
    <line x1="422" y1="256" x2="450" y2="256" />
    <line x1="119" y1="119" x2="139" y2="139" />
    <line x1="373" y1="373" x2="393" y2="393" />
    <line x1="119" y1="393" x2="139" y2="373" />
    <line x1="373" y1="139" x2="393" y2="119" />
  </g>
  <!-- Inner wheel hub -->
  <circle cx="256" cy="256" r="120" fill="#161a21" stroke="#2a313e" stroke-width="4"/>
  <!-- Balancing weight marker -->
  <circle cx="256" cy="256" r="14" fill="#ffd400"/>
  <!-- Spokes -->
  <g stroke="#e7eaf0" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="156" x2="256" y2="356"/>
    <line x1="156" y1="256" x2="356" y2="256"/>
    <line x1="185" y1="185" x2="327" y2="327"/>
    <line x1="185" y1="327" x2="327" y2="185"/>
  </g>
</svg>
